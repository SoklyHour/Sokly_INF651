<!-- Challenge: Grade Evaluator (If-Else Statements)
Objective: Write a program that takes a student’s score as input and displays their letter grade based on the following criteria:

A: 90 - 100
B: 80 - 89
C: 70 - 79
D: 60 - 69
F: below 60
Instructions:
Prompt the user to enter their score (between 0 and 100).
Use if-else statements to check the score and assign the correct letter grade.
Display the letter grade to the user using alert() or console.log().
Hints:
Make sure the score is a valid number between 0 and 100.
Use if-else or if-else if statements to evaluate the score and assign the grade.
You can convert the user input to a number using parseInt() or Number(). -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Evaluator</title>
    <script>
        // Function to evaluate the student's grade
        function evaluateGrade() {
            let score = parseInt(prompt("Please enter the student's score (between 0 and 100):"));

            // Check if the score is a valid number between 0 and 100
            if (isNaN(score) || score < 0 || score > 100) {
                alert("Please enter a valid score between 0 and 100.");
                return;
            }
            let grade;

            // If-else statements to determine the letter grade
            if (score >= 90) {
                grade = "A";
            } else if (score >= 80) {
                grade = "B";
            } else if (score >= 70) {
                grade = "C";
            } else if (score >= 60) {
                grade = "D";
            } else {
                grade = "F";
            }
            alert(`The student's grade is: ${grade}`);
        }

        // Call the grade evaluator function when the window loads
        window.onload = function() {
            evaluateGrade();
        };
    </script>
</head>
<body>
    <h1>Grade Evaluator Program</h1>
    <p>Please enter the student's score to evaluate their grade based on the following criteria:</p>
    <ul>
        <li>A: 90 - 100</li>
        <li>B: 80 - 89</li>
        <li>C: 70 - 79</li>
        <li>D: 60 - 69</li>
        <li>F: Below 60</li>
    </ul>
</body>
</html>
