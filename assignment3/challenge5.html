<!-- Challenge: Day Finder (Switch Case)
Objective: Write a program that takes a number (1-7) as input from the user and displays the corresponding day of the week. For example, if the user enters 1, the output should be Sunday.

Instructions:
Prompt the user to enter a number between 1 and 7.
Use a switch case statement to map each number to its corresponding day of the week:
1: Sunday
2: Monday
3: Tuesday
4: Wednesday
5: Thursday
6: Friday
7: Saturday
Display the day of the week to the user using alert() or console.log().
Hints:
Ensure the user inputs a valid number (between 1 and 7).
Use the switch to match the number with the correct day.
If the user enters a number outside the 1-7 range, display a message saying "Invalid input." -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day Finder</title>
    <script>
        function findDay() {
            // Prompt the user to enter a number between 1 and 7
            let dayNumber = parseInt(prompt("Enter a number between 1 and 7:"));

            // Check if the input is a valid number between 1 and 7
            if (isNaN(dayNumber) || dayNumber < 1 || dayNumber > 7) {
                alert("Invalid input. Please enter a number between 1 and 7.");
                return;
            }

            let dayName;

            // Use switch case to assign the correct day based on the number
            switch (dayNumber) {
                case 1:
                    dayName = "Sunday";
                    break;
                case 2:
                    dayName = "Monday";
                    break;
                case 3:
                    dayName = "Tuesday";
                    break;
                case 4:
                    dayName = "Wednesday";
                    break;
                case 5:
                    dayName = "Thursday";
                    break;
                case 6:
                    dayName = "Friday";
                    break;
                case 7:
                    dayName = "Saturday";
                    break;
                default:
                    dayName = "Invalid input.";
            }
            alert(`The day of the week is: ${dayName}`);
        }

        // Call the function when the window loads
        window.onload = function() {
            findDay();
        };
    </script>
</head>
<body>
    <h1>Day Finder Program</h1>
    <p>Please enter a number between 1 and 7 to find the corresponding day of the week:</p>
    <ul>
        <li>1: Sunday</li>
        <li>2: Monday</li>
        <li>3: Tuesday</li>
        <li>4: Wednesday</li>
        <li>5: Thursday</li>
        <li>6: Friday</li>
        <li>7: Saturday</li>
    </ul>
</body>
</html>
